<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher Management Portal | CodeTest Pro</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#004ac6",
            "primary-container": "#2563eb",
            "on-primary": "#ffffff",
            "on-primary-container": "#eeefff",
            "secondary": "#006e2f",
            "tertiary": "#784b00",
            "surface": "#f9f9ff",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f1f3ff",
            "surface-container-high": "#e1e8fd",
            "on-surface": "#141b2b",
            "on-surface-variant": "#434655",
            "outline-variant": "#c3c6d7",
            "background": "#f9f9ff"
          },
          fontFamily: { sans: ["Inter", "sans-serif"], mono: ["JetBrains Mono", "monospace"] }
        }
      }
    }
  </script>
  <style>
    .ambient-shadow { box-shadow: 0 16px 32px -12px rgba(0, 0, 0, 0.04), 0 4px 8px -2px rgba(0, 0, 0, 0.02); }
    .ambient-shadow-lg { box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.08), 0 8px 16px -4px rgba(0, 0, 0, 0.03); }
    .glow-button { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .glow-button:hover { box-shadow: 0 0 24px rgba(37, 99, 235, 0.35); transform: translateY(-1px); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; vertical-align: middle; }
  </style>
</head>
<body class="bg-background text-on-surface font-sans antialiased min-h-screen flex flex-col">

  <!-- TopAppBar -->
  <header class="fixed top-0 w-full z-50 bg-surface/90 backdrop-blur-md border-b border-outline-variant/30 shadow-sm flex justify-between items-center px-4 md:px-12 py-3">
    <div class="flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2 cursor-pointer">
        <span class="material-symbols-outlined text-primary text-2xl">school</span>
        <span class="font-bold text-lg text-primary tracking-tight">CodeTest Faculty Console</span>
      </a>
    </div>

    <div class="flex items-center gap-4">
      <button onclick="openAddQuestionModal()" class="bg-primary/10 text-primary border border-primary/30 px-3.5 py-1.5 rounded-xl font-semibold text-xs hover:bg-primary/20 transition-all flex items-center gap-1.5">
        <span class="material-symbols-outlined text-sm">add_circle</span> + Author Question
      </button>

      <div class="flex items-center gap-3 pl-3 border-l border-outline-variant/40">
        <div class="text-right hidden sm:block">
          <p class="font-semibold text-xs text-on-surface">Prof. Sarah Jenkins</p>
          <p class="text-[11px] text-on-surface-variant font-mono">Faculty • Computer Science</p>
        </div>
        <div class="w-9 h-9 rounded-full border-2 border-primary bg-primary-container flex items-center justify-center text-on-primary-container font-bold text-xs">
          SJ
        </div>
        <a href="auth.html" class="text-xs text-on-surface-variant hover:text-primary font-medium ml-2">Sign Out</a>
      </div>
    </div>
  </header>

  <div class="flex pt-16 min-h-screen">
    <!-- Sidebar Navigation -->
    <aside class="w-64 fixed md:sticky top-16 left-0 h-[calc(100vh-64px)] bg-surface border-r border-outline-variant/30 flex flex-col justify-between p-4 z-40">
      <div class="space-y-1">
        <button id="nav-dash" onclick="switchTab('dash')" class="w-full text-left bg-primary-container text-on-primary-container rounded-xl px-4 py-2.5 flex items-center gap-3 text-xs font-semibold">
          <span class="material-symbols-outlined text-lg">dashboard</span>
          Overview & Exams
        </button>
        <button id="nav-create" onclick="switchTab('create')" class="w-full text-left text-on-surface-variant hover:bg-surface-container-high rounded-xl px-4 py-2.5 flex items-center gap-3 text-xs font-medium transition-all">
          <span class="material-symbols-outlined text-lg">add_circle</span>
          Create New Exam
        </button>
        <button id="nav-bank" onclick="switchTab('bank')" class="w-full text-left text-on-surface-variant hover:bg-surface-container-high rounded-xl px-4 py-2.5 flex items-center gap-3 text-xs font-medium transition-all">
          <span class="material-symbols-outlined text-lg">quiz</span>
          Question Bank
        </button>
        <button id="nav-review" onclick="switchTab('review')" class="w-full text-left text-on-surface-variant hover:bg-surface-container-high rounded-xl px-4 py-2.5 flex items-center gap-3 text-xs font-medium transition-all">
          <span class="material-symbols-outlined text-lg">rate_review</span>
          Manual Review Queue
        </button>
        <button id="nav-analytics" onclick="switchTab('analytics')" class="w-full text-left text-on-surface-variant hover:bg-surface-container-high rounded-xl px-4 py-2.5 flex items-center gap-3 text-xs font-medium transition-all">
          <span class="material-symbols-outlined text-lg">analytics</span>
          Results & CSV Export
        </button>
      </div>

      <div class="pt-4 border-t border-outline-variant/30 space-y-1">
        <a href="dashboard.html" class="w-full text-left text-on-surface-variant hover:bg-surface-container-high rounded-xl px-4 py-2.5 flex items-center gap-3 text-xs font-medium transition-all">
          <span class="material-symbols-outlined text-lg">dashboard</span>
          Student View
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="teacher-content" class="flex-1 p-6 md:p-8 max-w-7xl mx-auto space-y-8 overflow-y-auto">
      <!-- Injected by JavaScript -->
    </main>
  </div>

  <!-- Interactive Add Question Builder Modal -->
  <div id="add-question-modal" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-surface-container-lowest border border-outline-variant/60 rounded-3xl p-6 md:p-8 max-w-2xl w-full space-y-6 ambient-shadow-lg max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center border-b border-outline-variant/30 pb-3">
        <div>
          <h2 class="text-xl font-bold text-on-surface">Author Question</h2>
          <p class="text-xs text-on-surface-variant">Choose type: Objective, Multiple Choice, Subjective, or Coding.</p>
        </div>
        <button onclick="closeAddQuestionModal()" class="text-on-surface-variant hover:text-on-surface p-1 rounded-lg">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <!-- 4 Question Type Tabs -->
      <div class="flex p-1 bg-surface-container-high rounded-xl flex-wrap">
        <button id="qtype-btn-objective" onclick="switchQuestionTypeForm('OBJECTIVE')" class="flex-1 min-w-[120px] py-2 rounded-lg text-[11px] font-semibold transition-all bg-surface-container-lowest text-primary shadow-sm">
          Objective (Single Choice)
        </button>
        <button id="qtype-btn-mcq_multiple" onclick="switchQuestionTypeForm('MCQ_MULTIPLE')" class="flex-1 min-w-[120px] py-2 rounded-lg text-[11px] font-semibold transition-all text-on-surface-variant hover:text-on-surface">
          Multiple Choice (Multi)
        </button>
        <button id="qtype-btn-subjective" onclick="switchQuestionTypeForm('SUBJECTIVE')" class="flex-1 min-w-[100px] py-2 rounded-lg text-[11px] font-semibold transition-all text-on-surface-variant hover:text-on-surface">
          Subjective
        </button>
        <button id="qtype-btn-coding" onclick="switchQuestionTypeForm('CODING')" class="flex-1 min-w-[90px] py-2 rounded-lg text-[11px] font-semibold transition-all text-on-surface-variant hover:text-on-surface">
          Coding
        </button>
      </div>

      <form onsubmit="handleSaveNewQuestion(event)" class="space-y-4">
        <!-- 1. OBJECTIVE FIELDS -->
        <div id="qform-objective-fields" class="space-y-4">
          <div>
            <label class="block text-xs font-bold text-on-surface mb-1">Objective Question Prompt</label>
            <textarea id="q-obj-prompt" required rows="3" class="w-full px-3.5 py-2.5 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none focus:border-primary" placeholder="e.g. What is the average time complexity of insertion in a Hash Map?"></textarea>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-semibold text-on-surface mb-1">Option 1</label>
              <input type="text" id="q-obj-opt-0" required value="O(1)" class="w-full px-3.5 py-2 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none focus:border-primary"/>
            </div>
            <div>
              <label class="block text-xs font-semibold text-on-surface mb-1">Option 2</label>
              <input type="text" id="q-obj-opt-1" required value="O(n)" class="w-full px-3.5 py-2 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none focus:border-primary"/>
            </div>
            <div>
              <label class="block text-xs font-semibold text-on-surface mb-1">Option 3</label>
              <input type="text" id="q-obj-opt-2" required value="O(log n)" class="w-full px-3.5 py-2 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none focus:border-primary"/>
            </div>
            <div>
              <label class="block text-xs font-semibold text-on-surface mb-1">Option 4</label>
              <input type="text" id="q-obj-opt-3" required value="O(n^2)" class="w-full px-3.5 py-2 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none focus:border-primary"/>
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-bold text-on-surface mb-1">Correct Option</label>
              <select id="q-obj-correct" class="w-full px-3.5 py-2.5 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs font-bold text-primary outline-none">
                <option value="0">Option 1 (O(1))</option>
                <option value="1">Option 2 (O(n))</option>
                <option value="2">Option 3 (O(log n))</option>
                <option value="3">Option 4 (O(n^2))</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-bold text-on-surface mb-1">Marks</label>
              <input type="number" id="q-obj-marks" required value="10" class="w-full px-3.5 py-2.5 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none focus:border-primary"/>
            </div>
          </div>
        </div>

        <!-- 2. MCQ MULTIPLE FIELDS -->
        <div id="qform-mcq_multiple-fields" class="space-y-4 hidden">
          <div>
            <label class="block text-xs font-bold text-on-surface mb-1">Multiple Choice Question Prompt (Multi-Correct)</label>
            <textarea id="q-mcqmulti-prompt" rows="3" class="w-full px-3.5 py-2.5 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none focus:border-primary" placeholder="e.g. Which of the following data structures are linear?"></placeholder></textarea>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-semibold text-on-surface mb-1">Option A (Correct)</label>
              <input type="text" id="q-multi-opt-0" value="Array" class="w-full px-3.5 py-2 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none"/>
            </div>
            <div>
              <label class="block text-xs font-semibold text-on-surface mb-1">Option B (Correct)</label>
              <input type="text" id="q-multi-opt-1" value="Linked List" class="w-full px-3.5 py-2 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none"/>
            </div>
            <div>
              <label class="block text-xs font-semibold text-on-surface mb-1">Option C</label>
              <input type="text" id="q-multi-opt-2" value="Binary Tree" class="w-full px-3.5 py-2 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none"/>
            </div>
            <div>
              <label class="block text-xs font-semibold text-on-surface mb-1">Option D</label>
              <input type="text" id="q-multi-opt-3" value="Graph" class="w-full px-3.5 py-2 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none"/>
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-on-surface mb-1">Marks</label>
            <input type="number" id="q-multi-marks" value="15" class="w-full px-3.5 py-2.5 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none focus:border-primary"/>
          </div>
        </div>

        <!-- 3. SUBJECTIVE FIELDS -->
        <div id="qform-subjective-fields" class="space-y-4 hidden">
          <div>
            <label class="block text-xs font-bold text-on-surface mb-1">Subjective Question Prompt</label>
            <textarea id="q-subj-prompt" rows="3" class="w-full px-3.5 py-2.5 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none focus:border-primary" placeholder="e.g. Explain the difference between Process and Thread in Operating Systems."></textarea>
          </div>

          <div>
            <label class="block text-xs font-bold text-on-surface mb-1">Model Answer / Key Points for Teacher Review</label>
            <textarea id="q-subj-model" rows="3" class="w-full px-3.5 py-2.5 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none focus:border-primary" placeholder="Model answer key points: Process has isolated memory, Thread shares memory..."></textarea>
          </div>

          <div>
            <label class="block text-xs font-bold text-on-surface mb-1">Marks</label>
            <input type="number" id="q-subj-marks" value="20" class="w-full px-3.5 py-2.5 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none focus:border-primary"/>
          </div>
        </div>

        <!-- 4. CODING FIELDS -->
        <div id="qform-coding-fields" class="space-y-4 hidden">
          <div>
            <label class="block text-xs font-bold text-on-surface mb-1">Problem Title</label>
            <input type="text" id="q-code-title" value="Two Sum Algorithm" class="w-full px-3.5 py-2.5 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none focus:border-primary"/>
          </div>

          <div>
            <label class="block text-xs font-bold text-on-surface mb-1">Problem Statement</label>
            <textarea id="q-code-statement" rows="3" class="w-full px-3.5 py-2.5 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none focus:border-primary">Given an array of integers nums and an integer target, return indices of the two numbers such that they add up to target.</textarea>
          </div>

          <div>
            <label class="block text-xs font-bold text-on-surface mb-1">Marks</label>
            <input type="number" id="q-code-marks" value="50" class="w-full px-3.5 py-2.5 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none focus:border-primary"/>
          </div>

          <div class="p-3 bg-surface-container-low border border-outline-variant/40 rounded-xl space-y-2">
            <span class="text-xs font-bold text-primary">Public Test Case</span>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
              <input type="text" id="q-pub-input" placeholder="Input: nums = [2,7,11,15], target = 9" value="nums = [2,7,11,15], target = 9" class="px-3 py-1.5 bg-surface border border-outline-variant/60 rounded-lg text-xs"/>
              <input type="text" id="q-pub-output" placeholder="Output: [0,1]" value="[0,1]" class="px-3 py-1.5 bg-surface border border-outline-variant/60 rounded-lg text-xs"/>
            </div>
          </div>
        </div>

        <div class="flex gap-3 pt-4 border-t border-outline-variant/30">
          <button type="button" onclick="closeAddQuestionModal()" class="flex-1 border border-outline-variant/60 py-3 rounded-xl font-semibold text-xs hover:bg-surface-container">
            Cancel
          </button>
          <button type="submit" class="flex-1 bg-primary text-on-primary py-3 rounded-xl font-semibold text-xs glow-button shadow-md">
            Save Question
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/src/views/teacher.js"></script>
</body>
</html>
