<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In | CodeTest Pro</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#004ac6",
            "primary-container": "#2563eb",
            "on-primary": "#ffffff",
            "surface": "#f9f9ff",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f1f3ff",
            "surface-container-high": "#e1e8fd",
            "on-surface": "#141b2b",
            "on-surface-variant": "#434655",
            "outline-variant": "#c3c6d7",
            "background": "#f9f9ff"
          },
          fontFamily: { sans: ["Inter", "sans-serif"] }
        }
      }
    }
  </script>
  <style>
    .glass-nav { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    .ambient-shadow-lg { box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.08), 0 8px 16px -4px rgba(0, 0, 0, 0.03); }
    .glow-button { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .glow-button:hover { box-shadow: 0 0 24px rgba(37, 99, 235, 0.35); transform: translateY(-1px); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; vertical-align: middle; }
  </style>
</head>
<body class="bg-background text-on-surface font-sans antialiased min-h-screen flex flex-col justify-center items-center p-4">

  <header class="fixed top-0 w-full z-50 glass-nav bg-surface/80 border-b border-outline-variant/30 px-6 py-4 flex justify-between items-center">
    <a href="index.html" class="flex items-center gap-2 cursor-pointer">
      <span class="material-symbols-outlined text-primary text-2xl">terminal</span>
      <span class="font-bold text-lg text-primary tracking-tight">CodeTest</span>
    </a>
    <a href="index.html" class="text-xs text-on-surface-variant hover:text-primary font-medium">Home</a>
  </header>

  <main class="w-full max-w-[420px] pt-12">
    <div class="bg-surface-container-lowest border border-outline-variant/60 rounded-3xl ambient-shadow-lg p-6 md:p-8 space-y-6">
      <div class="text-center">
        <h1 class="text-2xl font-bold text-on-surface" id="login-title">Sign In to CodeTest</h1>
        <p class="text-xs text-on-surface-variant mt-1">Select your account role to continue</p>
      </div>

      <!-- Role Selector Tabs -->
      <div class="flex p-1 bg-surface-container-high rounded-xl">
        <button id="role-student" onclick="selectRole('Student')" class="flex-1 py-2 rounded-lg text-xs font-semibold transition-all bg-surface-container-lowest text-primary shadow-sm">
          Student
        </button>
        <button id="role-teacher" onclick="selectRole('Teacher')" class="flex-1 py-2 rounded-lg text-xs font-semibold transition-all text-on-surface-variant hover:text-on-surface">
          Teacher / Faculty
        </button>
      </div>

      <!-- Simple Form -->
      <form onsubmit="handleLoginSubmit(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-on-surface mb-1">Email Address</label>
          <input type="email" id="login-email" required value="alex.rivera@example.com" class="w-full px-3.5 py-2.5 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none focus:border-primary"/>
        </div>

        <div>
          <label class="block text-xs font-semibold text-on-surface mb-1">Password</label>
          <input type="password" id="login-password" required value="••••••••••••" class="w-full px-3.5 py-2.5 bg-surface-container-low border border-outline-variant/60 rounded-xl text-xs outline-none focus:border-primary"/>
        </div>

        <button type="submit" id="login-btn" class="w-full bg-primary text-on-primary py-3 rounded-xl font-semibold text-xs glow-button shadow-md">
          Sign In as Student
        </button>
      </form>
    </div>
  </main>

  <script>
    let activeRole = 'Student';

    // Parse role from URL query param if present
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('role') === 'Teacher') {
      selectRole('Teacher');
    }

    function selectRole(role) {
      activeRole = role;
      const btnStudent = document.getElementById('role-student');
      const btnTeacher = document.getElementById('role-teacher');
      const emailInput = document.getElementById('login-email');
      const submitBtn = document.getElementById('login-btn');

      if (role === 'Teacher') {
        btnTeacher.className = "flex-1 py-2 rounded-lg text-xs font-semibold transition-all bg-surface-container-lowest text-primary shadow-sm";
        btnStudent.className = "flex-1 py-2 rounded-lg text-xs font-semibold transition-all text-on-surface-variant hover:text-on-surface";
        emailInput.value = "sarah.j@techcorp.io";
        submitBtn.innerText = "Sign In as Teacher";
      } else {
        btnStudent.className = "flex-1 py-2 rounded-lg text-xs font-semibold transition-all bg-surface-container-lowest text-primary shadow-sm";
        btnTeacher.className = "flex-1 py-2 rounded-lg text-xs font-semibold transition-all text-on-surface-variant hover:text-on-surface";
        emailInput.value = "alex.rivera@example.com";
        submitBtn.innerText = "Sign In as Student";
      }
    }

    function handleLoginSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.innerHTML = `<span class="material-symbols-outlined text-sm animate-spin">progress_activity</span> Logging in...`;

      setTimeout(() => {
        if (activeRole === 'Teacher') {
          window.location.href = 'teacher.html';
        } else {
          window.location.href = 'dashboard.html';
        }
      }, 500);
    }
  </script>
</body>
</html>
